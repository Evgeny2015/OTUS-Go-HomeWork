syntax = "proto3";

package calendar;

option go_package = "github.com/Evgeny2015/OTUS-Go-HomeWork/hw12_13_14_15_calendar/internal/protobuf";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// Event represents a calendar event
message Event {
    string id = 1;
    string title = 2;
    google.protobuf.Timestamp date_time = 3;
    google.protobuf.Duration duration = 4;
    string description = 5;
    string user_id = 6;
    google.protobuf.Duration notify_before = 7;
}