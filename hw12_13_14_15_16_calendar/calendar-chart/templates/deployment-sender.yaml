{{- if .Values.sender.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "calendar-chart.fullname" . }}-sender
  labels:
    {{- include "calendar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: sender
spec:
  replicas: {{ .Values.sender.replicaCount }}
  selector:
    matchLabels:
      {{- include "calendar-chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sender
  template:
    metadata:
      labels:
        {{- include "calendar-chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sender
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sender
          image: "{{ .Values.sender.image.repository }}:{{ .Values.sender.image.tag }}"
          imagePullPolicy: {{ .Values.sender.image.pullPolicy }}
          env:
            {{- range .Values.sender.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.sender.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/calendar
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "calendar-chart.fullname" . }}-sender-config
      {{- with .Values.sender.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sender.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sender.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}