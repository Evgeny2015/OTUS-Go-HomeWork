{{- if .Values.sender.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "calendar-chart.fullname" . }}-sender
  labels:
    {{- include "calendar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: sender
spec:
  type: {{ .Values.sender.service.type }}
  ports:
    - port: {{ .Values.sender.service.port }}
      targetPort: {{ .Values.sender.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "calendar-chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: sender
{{- end }}