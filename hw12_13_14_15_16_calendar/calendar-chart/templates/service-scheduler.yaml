{{- if .Values.scheduler.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "calendar-chart.fullname" . }}-scheduler
  labels:
    {{- include "calendar-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  type: {{ .Values.scheduler.service.type }}
  ports:
    - port: {{ .Values.scheduler.service.port }}
      targetPort: {{ .Values.scheduler.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "calendar-chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
{{- end }}